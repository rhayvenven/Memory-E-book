<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/designs.css" />
    <link href="https://fonts.cdnfonts.com/css/dasher" rel="stylesheet" />
    <link
      href="https://fonts.cdnfonts.com/css/haunted-villa"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-text">Memory Book</div>
    <input class="main-search" type="search" placeholder="Search Memories" />
    <div class="main-btns">
      <button
        class="main-btn"
        onclick="window.location.href = 'new_memory.html'"
      >
        Add New Memory
      </button>
      <button class="main-btn" onclick="window.location.href = 'memories.html'">
        Memories
      </button>
      <button
        class="main-btn"
        onclick="window.location.href = 'favorites.html'"
      >
        Favorites
      </button>
      <button class="main-btn" onclick="window.location.href = 'calendar.html'">
        Calendar
      </button>
      <button class="main-btn" onclick="window.location.href = 'settings.html'">
        Settings
      </button>
    </div>
    <div class="divider"></div>
    <section class="on-this-day">
      <h2>📅 On This Day</h2>
      <p>You don't have any memories for today yet.</p>
      <button class="day-btn">Open Memory</button>
    </section>
  </body>
</html>
