<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/designs.css" />
    <link href="https://fonts.cdnfonts.com/css/dasher" rel="stylesheet" />
    <link
      href="https://fonts.cdnfonts.com/css/haunted-villa"
      rel="stylesheet"
    />
  </head>
  <body>
    <button class="back-button" onclick="window.location.href = 'index.html'">
      <img src="../images/back.png" alt="Back" />
    </button>
    <div class="main-text">Memory Book</div>
    <div class="date">
      <h3><time id="current-date"></time></h3>
      <script>
        const dateElement = document.getElementById("current-date");
        dateElement.textContent = new Date().toDateString();
      </script>
    </div>
    <h3 class="txt">Title</h3>
    <form class="memory-title">
      <label for="memoryTitle"></label>
      <input
        class="title-input"
        type="text"
        id="memoryTitle"
        placeholder="Memory Title"
      />
    </form>
    <div class="emoji-mood">
      <h3 class="emoji">Mood</h3>
      <div class="emoji-container">
        <button class="emoji-button" onclick="selectEmoji('😊')">😊</button>
        <button class="emoji-button" onclick="selectEmoji('😢')">😢</button>
        <button class="emoji-button" onclick="selectEmoji('😡')">😡</button>
        <button class="emoji-button" onclick="selectEmoji('😱')">😱</button>
        <button class="emoji-button" onclick="selectEmoji('😍')">😍</button>
      </div>
    </div>
    <div class="photo">
      <h3 class="pic-txt">Photos</h3>
      <div class="image-upload">
        <label for="imageInput">
          <img class="add-icon" src="../images/add.png" alt="Add Photo" />
        </label>
        <img id="preview" class="preview-image" hidden />
        <input type="file" id="imageInput" accept="image/*" hidden />
      </div>
    </div>
    <script src="../js/add-memory.js"></script>
  </body>
</html>
